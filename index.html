<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Стеша">
<meta name="theme-color" content="#ff6eb4">
<title>Стеша</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://img.icons8.com/?size=180&id=Sawg2D8Sr9wA&format=png&color=000000">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Unbounded:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f4f3ff;--card:#fff;--card2:#ede9ff;
    --accent1:#ff6eb4;--accent2:#5ab4ff;--accent3:#ffd166;--accent4:#2edba8;
    --text:#1a1830;--muted:#9490b8;--border:rgba(0,0,0,0.07);
    --shadow:0 2px 16px rgba(80,60,180,0.07);--gap:10px;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#0d0d1a;--card:#161626;--card2:#1e1e32;
    --text:#f0eeff;--muted:#6b6a8a;--border:rgba(255,255,255,0.06);
    --shadow:0 2px 16px rgba(0,0,0,0.3);
  }}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:var(--bg);}
  body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;padding:52px 15px 40px;max-width:430px;margin:0 auto;}

  /* HEADER */
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
  .header-date-btn{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;}
  .header-date-btn .dot{color:var(--accent1);}
  .header-date-btn .arr{font-size:10px;color:var(--muted);}
  .header-time{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px;}
  .refresh-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--muted);box-shadow:var(--shadow);}
  .refresh-btn.spinning{animation:spin 0.7s linear;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* DATE PICKER */
  .date-picker{background:var(--card2);border:1px solid var(--border);border-radius:16px;padding:12px;margin-bottom:12px;display:none;}
  .date-picker.show{display:block;}
  .date-picker-title{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
  .date-options{display:flex;gap:8px;}
  .date-opt{flex:1;text-align:center;padding:10px 4px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);background:var(--bg);line-height:1.4;}
  .date-opt.active{background:var(--accent1);color:#fff;border-color:transparent;}

  /* AGE */
  .age-bar{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);}
  .age-emoji{font-size:20px;flex-shrink:0;}
  .age-main{flex:1;}
  .age-text{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;color:var(--accent1);}
  .age-sub{font-size:10px;color:var(--muted);font-weight:600;margin-top:1px;}
  .age-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
  .age-wh{font-size:11px;font-weight:700;color:var(--text);}
  .age-birthday{font-size:10px;color:var(--accent3);font-weight:700;}

  /* STATUS */
  .status-big{background:var(--card2);border:1px solid var(--border);border-radius:24px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .status-big::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(255,210,102,0.10) 0%,transparent 65%);pointer-events:none;}
  .status-row{display:flex;align-items:center;gap:14px;}
  .status-icon{width:56px;height:56px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;}
  .status-icon.awake{background:rgba(255,210,102,0.12);}
  .status-icon.sleep{background:rgba(90,180,255,0.12);}
  .status-title{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;line-height:1;margin-bottom:5px;}
  .status-timer{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:700;color:var(--accent4);line-height:1;margin-bottom:3px;}
  .status-since{font-size:12px;color:var(--muted);font-weight:600;}

  /* ACTION BUTTONS */
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:12px;}
  .act-card{border-radius:20px;padding:16px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;transition:opacity 0.15s,transform 0.15s;}
  .act-card:active{opacity:0.7;transform:scale(0.97);}
  .act-card.btn-sleep{background:var(--accent2);color:#0d0d1a;}
  .act-card.btn-wake{background:var(--accent3);color:#0d0d1a;}
  .act-card.btn-feed{background:var(--accent1);color:#fff;}
  .act-card.btn-loading{opacity:0.6;pointer-events:none;}

  /* MINI CARDS */
  .mini-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .mini-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 20px 20px;}
  .mini-card.sleep-c::after{background:var(--accent2);}
  .mini-card.feed-c::after{background:var(--accent1);}
  .mini-icon{font-size:18px;margin-bottom:8px;}
  .mini-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:4px;}
  .mini-time{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
  .mini-card.sleep-c .mini-time{color:var(--accent2);}
  .mini-card.feed-c .mini-time{color:var(--accent1);}
  .mini-sub{font-size:10px;color:var(--muted);font-weight:600;}

  /* CIRCLE + PILLS */
  .circle-pills-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:12px;align-items:stretch;}
  .circle-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:var(--gap);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  .circle-wrap{position:relative;width:100%;aspect-ratio:1;}
  .circle-wrap svg{transform:rotate(-90deg);width:100%;height:100%;display:block;}
  .circle-bg{fill:none;stroke:rgba(128,128,128,0.12);stroke-width:9;}
  .circle-fill{fill:none;stroke:url(#sleepGrad);stroke-width:9;stroke-linecap:round;stroke-dasharray:251;stroke-dashoffset:251;transition:stroke-dashoffset 1s ease;}
  .circle-inner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .circle-val{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:700;color:var(--accent4);line-height:1;}
  .circle-lbl{font-size:8px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.8px;margin-top:3px;}
  .pills-col{display:flex;flex-direction:column;gap:var(--gap);}
  .pill{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:10px 12px;flex:1;display:flex;flex-direction:column;justify-content:center;box-shadow:var(--shadow);}
  .pill-val{font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;line-height:1;margin-bottom:3px;}
  .pill-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.7px;}

  /* WEIGHT HEIGHT */
  .wh-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:12px;}
  .wh-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;cursor:pointer;position:relative;overflow:hidden;box-shadow:var(--shadow);}
  .wh-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 20px 20px;}
  .wh-card.weight::after{background:var(--accent3);}
  .wh-card.height::after{background:var(--accent4);}
  .wh-icon{font-size:18px;margin-bottom:8px;}
  .wh-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:4px;}
  .wh-val{font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px;}
  .wh-card.weight .wh-val{color:var(--accent3);}
  .wh-card.height .wh-val{color:var(--accent4);}
  .wh-date{font-size:10px;color:var(--muted);font-weight:600;}
  .wh-edit-icon{position:absolute;top:14px;right:14px;font-size:13px;color:var(--muted);}

  /* CHART */
  .chart-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);}
  .chart-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:14px;}
  .chart-bars{display:flex;gap:6px;height:80px;}
  .chart-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .chart-bar-wrap{flex:1;width:100%;position:relative;border-radius:6px;overflow:hidden;background:rgba(255,126,179,0.12);}
  .chart-bar{display:none;}
  .chart-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:6px 6px 0 0;background:var(--accent2);opacity:0.75;transition:height 0.6s ease;}
  .chart-bar-label{position:absolute;bottom:5px;left:0;right:0;text-align:center;font-family:'Unbounded',sans-serif;font-size:8px;font-weight:700;color:rgba(255,255,255,0.8);z-index:3;line-height:1;pointer-events:none;}
  .chart-day-lbl{font-size:9px;color:var(--muted);font-weight:700;}
  .chart-day.today .chart-bar-fill{background:linear-gradient(to top,var(--accent2),var(--accent4));opacity:1;}

  .chart-norm-line{position:absolute;left:0;right:0;height:1px;background:rgba(255,126,179,0.5);bottom:85.7%;}
  .chart-day.today .chart-day-lbl{color:var(--accent4);font-weight:900;}
  /* HISTORY */
  .hist-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;margin-top:4px;}
  .day-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);}
  .add-btn{width:26px;height:26px;border-radius:8px;background:var(--card2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:var(--accent4);font-weight:700;line-height:1;box-shadow:var(--shadow);}
  .two-col-hist{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:12px;}
  .hist-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;box-shadow:var(--shadow);}
  .hist-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:10px;}
  .hist-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;}
  .hist-item:last-child{border-bottom:none;padding-bottom:0;}
  .hist-item:first-child{padding-top:0;}
  .hist-item:active{opacity:0.6;}
  .hist-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .dot-wake{background:var(--accent3);}
  .dot-sleep{background:var(--accent2);}
  .dot-feed{background:var(--accent1);}
  .hist-time{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;min-width:36px;}
  .hist-info{flex:1;}
  .hist-desc{font-size:11px;font-weight:700;}
  .hist-dur{font-size:9px;color:var(--muted);font-weight:600;}
  .hist-edit{font-size:12px;color:var(--muted);}

  /* BACKUP */
  .backup-row{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-top:4px;}
  .backup-btn{border-radius:16px;padding:13px 10px;border:1px solid var(--border);cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;text-align:center;background:var(--card);transition:opacity 0.15s;}
  .backup-btn:active{opacity:0.7;}
  .backup-btn.export{color:var(--accent3);border-color:rgba(255,209,102,0.25);}
  .backup-btn.restore{color:var(--muted);}

  /* NOTIFY BAR */
  .bell-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:var(--shadow);}
  .bell-btn.on{background:rgba(46,219,168,0.15);border-color:rgba(46,219,168,0.3);}
  .bell-btn.off{background:rgba(255,77,77,0.12);border-color:rgba(255,77,77,0.25);}
  .bell-btn.unknown{background:var(--card);color:var(--muted);}

  /* MODAL */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s;}
  .modal-overlay.show{opacity:1;pointer-events:all;}
  .modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 44px;width:100%;max-width:430px;transform:translateY(100%);transition:transform 0.3s ease;}
  .modal-overlay.show .modal{transform:translateY(0);}
  .modal-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;margin-bottom:18px;}
  .modal-types{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:18px;}
  .modal-type{border-radius:14px;padding:12px 6px;border:1px solid var(--border);cursor:pointer;text-align:center;background:var(--bg);}
  .modal-type.active{border-color:var(--accent4);background:rgba(46,219,168,0.08);}
  .modal-type-icon{font-size:20px;margin-bottom:4px;}
  .modal-type-lbl{font-size:11px;font-weight:700;color:var(--muted);}
  .modal-type.active .modal-type-lbl{color:var(--accent4);}
  .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
  .modal-field label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:block;margin-bottom:7px;}
  .modal-field select,.modal-field input[type=time],.modal-field input[type=text],.modal-field input[type=number]{width:100%;padding:12px 14px;border-radius:12px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-family:'Unbounded',sans-serif;font-size:16px;font-weight:700;outline:none;}
  .modal-field select:focus,.modal-field input:focus{border-color:var(--accent2);}
  .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-cancel{background:var(--bg);border:1px solid var(--border);color:var(--muted);border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;}
  .modal-save{background:var(--accent4);border:none;color:#0d0d1a;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;}
  .modal-save:disabled{opacity:0.6;pointer-events:none;}

  /* EDIT MODAL */
  .edit-modal-input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid var(--border);background:var(--bg);color:var(--text);font-family:'Unbounded',sans-serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:16px;outline:none;}
  .edit-modal-input:focus{border-color:var(--accent2);}
  .modal-btns-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
  .modal-delete{background:rgba(255,77,77,0.1);border:1px solid rgba(255,77,77,0.25);color:#ff4d4d;border-radius:14px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;}

  /* TOAST */
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1830;color:#fff;padding:10px 20px;border-radius:14px;font-size:13px;font-weight:700;opacity:0;transition:opacity 0.3s;z-index:300;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}

  /* LOADING */
  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;font-weight:600;}
  .loading-spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  .error-card{background:var(--card);border:1px solid rgba(255,100,100,0.2);border-radius:20px;padding:20px;text-align:center;color:var(--muted);font-size:14px;font-weight:600;}

  .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent4);vertical-align:middle;animation:pulseAnim 2s infinite;}
  @keyframes pulseAnim{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .fu{animation:fadeUp 0.3s ease both;}
  .fu1{animation-delay:0.04s}.fu2{animation-delay:0.08s}.fu3{animation-delay:0.12s}
  html,body{height:100%;overflow:hidden;}
  body{padding:0;max-width:none;margin:0;}
  .app{position:relative;width:100%;height:100%;}
  .dashboard-page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:52px 15px 40px;max-width:430px;margin:0 auto;transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);will-change:transform;}
  .dashboard-page.slide-down{transform:translateY(100%);}
  .nb-page{position:absolute;top:0;left:0;right:0;bottom:0;overflow:hidden;background:var(--bg);transform:translateY(100%);transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);will-change:transform;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
  .nb-page.slide-up{transform:translateY(0);}
  .nb-header{display:flex;align-items:center;justify-content:space-between;padding:52px 15px 16px;flex-shrink:0;}
  .nb-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;color:var(--accent2);cursor:pointer;padding:8px 14px;background:rgba(90,180,255,0.08);border:1px solid rgba(90,180,255,0.15);border-radius:12px;}
  .nb-back:active{opacity:0.7;}
  .nb-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;}
  .nb-badge{font-size:11px;color:var(--muted);font-weight:600;background:var(--card2);padding:4px 10px;border-radius:8px;}
  .nb-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 15px 100px;}
  .nb-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);}
  .nb-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .nb-date-btn{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--accent3);background:rgba(255,209,102,0.08);border:1px solid rgba(255,209,102,0.2);border-radius:8px;padding:4px 10px;cursor:pointer;outline:none;}
  .nb-time-btn{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:4px 10px;cursor:pointer;outline:none;}
  .nb-modified{font-size:10px;color:var(--muted);margin-left:auto;}
  .nb-offline{font-size:10px;color:var(--accent3);font-weight:700;background:rgba(255,209,102,0.1);border-radius:6px;padding:2px 7px;}
  .nb-textarea{font-size:16px;line-height:1.6;color:var(--text);font-family:'Nunito',sans-serif;font-weight:600;background:transparent;border:none;outline:none;width:100%;resize:none;min-height:50px;caret-color:var(--accent2);}
  .nb-textarea::placeholder{color:var(--muted);}
  .nb-footer{display:flex;justify-content:flex-end;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .nb-del-btn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(255,77,77,0.2);background:rgba(255,77,77,0.06);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
  .nb-fab{position:absolute;bottom:30px;right:20px;width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent1),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 4px 24px rgba(255,110,180,0.35);border:none;color:#fff;}
  .nb-fab:active{transform:scale(0.93);}
  .notebook-btn{width:34px;height:34px;border-radius:10px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--muted);box-shadow:var(--shadow);}
  .notebook-btn.active{background:rgba(255,209,102,0.15);border-color:rgba(255,209,102,0.3);}
  .offline-bar{background:rgba(255,209,102,0.10);border:1px solid rgba(255,209,102,0.2);border-radius:12px;padding:8px 14px;margin-bottom:10px;font-size:11px;font-weight:700;color:var(--accent3);display:none;text-align:center;}
  .offline-bar.show{display:block;}
  .fu4{animation-delay:0.16s}.fu5{animation-delay:0.20s}.fu6{animation-delay:0.24s}
</style>
</head>
<body>
<div class="app">
<div class="dashboard-page" id="dashboardPage">
<div class="header fu">
  <div>
    <div class="header-date-btn" id="headerDateBtn" onclick="toggleDatePicker()">
      Стеша <span class="dot">·</span> <span id="headerDate"></span> <span class="arr">▾</span>
    </div>
    <div class="header-time" id="headerTime"></div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="notebook-btn" id="notebookBtn" onclick="openNotes()">📓</div>
    <div class="bell-btn unknown" id="bellBtn" onclick="onBellClick()">🔔</div>
    <div class="refresh-btn" id="refreshBtn">↻</div>
  </div>
</div>

<div class="date-picker" id="datePicker">
  <div class="date-picker-title">Выберите день</div>
  <div class="date-options" id="dateOptions"></div>
</div>

<div class="offline-bar" id="offlineBar"></div>
<div id="content"><div class="loading"><div class="loading-spinner"></div>Загружаем данные…</div></div>


<script>
var API_URL = "https://script.google.com/macros/s/AKfycbyXrM5u2rDvo7hG8Xqi9cXO46dJhZYUOAwxlX8x9isUeT1nA1EEwmMRLyJsww5A4qzMlg/exec";
var BIRTHDAY = new Date(2025, 6, 23);
var MONTHS = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
var MONTHS_SHORT = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
var NORM_MIN = 180;
var FEED_INTERVAL_MIN = 240;
var DAY_SLEEP_START = 420;  // 7:00
var DAY_SLEEP_END = 1170;   // 19:30
var MORNING_WB_START = 300; // 5:00
var MORNING_WB_END = 600;   // 10:00
var notifyTimers = [];
var editRowIndex = null;
var whType = null;
var selectedDayOffset = 0;
var currentHistory = [];
var _lastFeedTime = null;

// ── CONSTANTS ──
var LS_QUEUE  = "stesha_queue";
var LS_CACHE  = "stesha_cache";
var LS_NOTES  = "stesha_notes";

// ── UTILS ──
function z2(n){n=parseInt(n)||0;return('0'+Math.abs(n)).slice(-2);}
function safeNum(n,def){var v=parseFloat(n);return isNaN(v)?(def||0):v;}
function safeMin(n){return Math.max(0,Math.round(safeNum(n,0)));}
function pluralRus(n,one,few,many){n=Math.abs(n)%100;var n1=n%10;if(n>10&&n<20)return many;if(n1>1&&n1<5)return few;if(n1==1)return one;return many;}
function formatMin(m){m=safeMin(m);var h=Math.floor(m/60),mn=m%60,p=[];if(h>0)p.push(h+pluralRus(h,"ч","ч","ч"));if(mn>0)p.push(mn+pluralRus(mn,"м","м","м"));return p.length?p.join(" "):"<1м";}
function formatMinLong(m){m=safeMin(m);var h=Math.floor(m/60),mn=m%60,p=[];if(h>0)p.push(h+" "+pluralRus(h,"час","часа","часов"));if(mn>0)p.push(mn+" "+pluralRus(mn,"минута","минуты","минут"));return p.length?p.join(" "):"меньше минуты";}
function minsAgo(d){return Math.max(0,Math.floor((Date.now()-d.getTime())/60000));}
function minsUntil(t){
  if(!t)return null;
  if(t instanceof Date)return Math.floor((t.getTime()-Date.now())/60000);
  var p=t.split(":"),tgt=new Date();
  tgt.setHours(parseInt(p[0]),parseInt(p[1]),0,0);
  return Math.floor((tgt-Date.now())/60000);
}
function formatCountdown(mins){
  if(mins===null)return"нет данных";
  if(mins>=0)return"через "+formatMin(mins);
  return"<span style='color:#ff4d4d;font-weight:800'>"+formatMin(Math.abs(mins))+" назад</span>";
}
function getLogicalDate(date){var d=new Date(date.getTime());if(d.getHours()<6)d.setDate(d.getDate()-1);return d;}
function getLogicalDateStr(date){return getLogicalDate(date).toDateString();}
function dateToHHMM(d){if(!d||!(d instanceof Date))return"—";return z2(d.getHours())+":"+z2(d.getMinutes());}

function calcAge(){
  var now=new Date(),y=now.getFullYear()-BIRTHDAY.getFullYear(),m=now.getMonth()-BIRTHDAY.getMonth(),d=now.getDate()-BIRTHDAY.getDate();
  if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}
  if(m<0){y--;m+=12;}
  return{years:y,months:m,days:d};
}

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2500);
}

// ── SLEEP/FEED CALC ──
function calcNextSleep(wakeDate){
  if(!wakeDate)return null;
  var totalMin=wakeDate.getHours()*60+wakeDate.getMinutes();
  var interval=(totalMin>=MORNING_WB_START&&totalMin<MORNING_WB_END)?135:150;
  return new Date(wakeDate.getTime()+interval*60000);
}
function calcNextFeed(feedDate){
  if(!feedDate)return null;
  return new Date(feedDate.getTime()+FEED_INTERVAL_MIN*60000);
}

// ── LOCAL CACHE (last 100 records) ──
function getCachedHistory(){
  try{var r=localStorage.getItem(LS_CACHE);return r?JSON.parse(r):null;}catch(e){return null;}
}
function setCachedHistory(history){
  try{localStorage.setItem(LS_CACHE,JSON.stringify(history));}catch(e){}
}

// ── OFFLINE QUEUE — persistent via localStorage ──
function getQueue(){
  try{var r=localStorage.getItem(LS_QUEUE);return r?JSON.parse(r):[];}catch(e){return[];}
}
function saveQueue(q){
  try{localStorage.setItem(LS_QUEUE,JSON.stringify(q));}catch(e){}
}
function enqueue(item){
  // item: {id, url, label, ts}
  var q=getQueue();
  q.push(item);
  saveQueue(q);
  updateOfflineBar();
}
function removeFromQueue(id){
  var q=getQueue().filter(function(x){return x.id!==id;});
  saveQueue(q);
  updateOfflineBar();
}

// Проверка сети — не только navigator.onLine
var _networkOk=navigator.onLine;
function isOnline(){return _networkOk&&navigator.onLine;}

function pingNetwork(){
  fetch(API_URL+"?mode=ping",{method:"GET",cache:"no-store"})
    .then(function(){_networkOk=true;})
    .catch(function(){_networkOk=false;});
}
setInterval(pingNetwork,30000);

function flushQueue(){
  var q=getQueue();
  if(!q.length)return;
  // Обрабатываем каждую запись независимо
  q.forEach(function(item){
    fetch(item.url)
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.ok||data.skipped){
          removeFromQueue(item.id);
          updateOfflineBar();
        }
      })
      .catch(function(){
        // retry позже — запись остаётся в очереди
      });
  });
}

function updateOfflineBar(){
  var bar=document.getElementById("offlineBar");
  if(!bar)return;
  var q=getQueue();
  if(!isOnline()){
    bar.className="offline-bar show";
    bar.innerHTML='📵 Офлайн'+(q.length?' · '+q.length+' в очереди':'');
    bar.onclick=null;
  } else if(q.length>0){
    bar.className="offline-bar show";
    bar.innerHTML='⏳ '+q.length+' '+pluralRus(q.length,"запись","записи","записей")+' ожидают синхронизации <u>подробнее</u>';
    bar.style.cursor="pointer";
    bar.onclick=showQueueModal;
  } else {
    bar.className="offline-bar";
    bar.onclick=null;
  }
}

function showQueueModal(){
  var q=getQueue();
  if(!q.length){showToast("✅ Очередь пуста");return;}
  var msg="Ожидают отправки:\n\n";
  q.forEach(function(item,i){
    var d=new Date(item.ts);
    msg+=(i+1)+". "+item.label+" ("+z2(d.getHours())+":"+z2(d.getMinutes())+")\n";
  });
  msg+="\nОтменить конкретную запись нельзя из этого окна — удалите её через ✏️ в истории после синхронизации.";
  alert(msg);
}

window.addEventListener("online",function(){
  _networkOk=true;
  showToast("✅ Сеть восстановлена");
  flushQueue();
  updateOfflineBar();
  loadData();
});
window.addEventListener("offline",function(){
  _networkOk=false;
  updateOfflineBar();
});

// ── HEADER ──
function updateHeader(){
  var now=new Date();
  document.getElementById("headerTime").textContent=z2(now.getHours())+":"+z2(now.getMinutes());
  updateHeaderDate();
}
function updateHeaderDate(){
  var now=new Date();
  var d=new Date(now.getTime()-selectedDayOffset*86400000);
  var dateStr=d.getDate()+" "+MONTHS[d.getMonth()]+" "+d.getFullYear()+" г.";
  var label=selectedDayOffset===0?" · Сегодня":selectedDayOffset===1?" · Вчера":"";
  document.getElementById("headerDate").innerHTML=dateStr+'<span style="font-size:11px;color:var(--muted);font-weight:600;margin-left:4px;">'+label+'</span>';
}
function buildDateOptions(){
  var now=new Date();
  var wrap=document.getElementById("dateOptions");
  wrap.innerHTML="";
  for(var i=0;i<4;i++){
    var d=new Date(now.getTime()-i*86400000);
    var label=i===0?"Сегодня":i===1?"Вчера":(i+" дня назад");
    var sub=d.getDate()+" "+MONTHS_SHORT[d.getMonth()];
    var el=document.createElement("div");
    el.className="date-opt"+(i===0?" active":"");
    el.dataset.offset=i;
    el.innerHTML=label+"<br><span style='font-size:9px;opacity:0.7'>"+sub+"</span>";
    el.onclick=(function(offset,elem){return function(){
      document.querySelectorAll(".date-opt").forEach(function(o){o.classList.remove("active");});
      elem.classList.add("active");
      selectedDayOffset=offset;
      document.getElementById("datePicker").classList.remove("show");
      updateHeaderDate();
      renderForDay();
    };})(i,el);
    wrap.appendChild(el);
  }
}
function toggleDatePicker(){document.getElementById("datePicker").classList.toggle("show");}

// ── NOTIFICATIONS ──
function isNotifyHour(){var h=new Date().getHours();return h>=6||h<2;}
function registerSW(){
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js")
      .then(function(reg){console.log("SW:",reg.scope);})
      .catch(function(e){console.log("SW fail:",e);});
  }
}
function requestNotifyPermission(){
  if(!("Notification" in window)){showToast("⚠️ Уведомления не поддерживаются");return;}
  if(Notification.permission==="granted"){showToast("✅ Уже включены");return;}
  Notification.requestPermission().then(function(p){
    updateBell();
    showToast(p==="granted"?"✅ Уведомления включены!":"❌ Не разрешены");
  });
}
function sendNotification(title,body){
  if(!("Notification" in window)||Notification.permission!=="granted")return;
  if(!isNotifyHour())return;
  try{
    if("serviceWorker" in navigator){
      navigator.serviceWorker.ready.then(function(reg){
        reg.showNotification(title,{body:body,icon:"https://img.icons8.com/?size=192&id=Sawg2D8Sr9wA&format=png&color=000000",badge:"https://img.icons8.com/?size=96&id=Sawg2D8Sr9wA&format=png&color=000000",vibrate:[200,100,200],tag:"stesha-notify",renotify:true});
      }).catch(function(){try{new Notification(title,{body:body});}catch(e){}});
    } else {new Notification(title,{body:body});}
  }catch(e){}
}
function clearNotifyTimers(){for(var i=0;i<notifyTimers.length;i++)clearTimeout(notifyTimers[i]);notifyTimers=[];}
function scheduleNotify(type,targetDate){
  if(!targetDate||!(targetDate instanceof Date))return;
  var msUntil=targetDate.getTime()-Date.now();
  if(msUntil<-60000)return;
  var titles={sleep:{warn:"🛏 Через 10 минут укладываем",exact:"🛏 Пора укладывать Стешу"},feed:{warn:"🍼 Через 10 минут кормим",exact:"🍼 Пора кормить Стешу"}};
  var t=titles[type];if(!t)return;
  var hhmm=dateToHHMM(targetDate);
  var ms10=msUntil-10*60000;
  if(ms10>0&&ms10<8*3600000){
    notifyTimers.push(setTimeout(function(){
      if(type==="feed"&&_lastFeedTime&&_lastFeedTime.getTime()>=targetDate.getTime())return;
      sendNotification(t.warn,"В "+hhmm);
    },ms10));
  }
  if(msUntil>0&&msUntil<8*3600000){
    notifyTimers.push(setTimeout(function(){
      if(type==="feed"&&_lastFeedTime&&_lastFeedTime.getTime()>=targetDate.getTime())return;
      sendNotification(t.exact,"Запланировано на "+hhmm);
    },msUntil));
  }
}
function notifyRecorded(type){
  var msgs={sleep:"🌙 Сон записан",wake:"☀️ Пробуждение записано",feed:"🍼 Питание записано"};
  if(msgs[type])sendNotification(msgs[type],"");
}
function onBellClick(){
  if(!("Notification" in window)){showToast("⚠️ Не поддерживается");return;}
  if(Notification.permission==="granted"){showToast("✅ Уведомления включены");return;}
  requestNotifyPermission();
}
function updateBell(){
  var btn=document.getElementById("bellBtn");if(!btn)return;
  if(!("Notification" in window)){btn.className="bell-btn unknown";btn.textContent="🔔";return;}
  if(Notification.permission==="granted"){btn.className="bell-btn on";btn.textContent="🔔";}
  else if(Notification.permission==="denied"){btn.className="bell-btn off";btn.textContent="🔕";}
  else{btn.className="bell-btn unknown";btn.textContent="🔔";}
}

// ── ACTIONS ──
function sendAction(action,btnEl,label){
  var orig=btnEl.textContent;
  btnEl.classList.add("btn-loading");
  btnEl.textContent="⏳ "+label+"...";

  var msgMap={sleep:"Уснула",wake:"Проснулась",feed:"Поела"};
  var now=new Date();
  var timeStr=z2(now.getHours())+":"+z2(now.getMinutes());
  var msg=encodeURIComponent(msgMap[action]+" в "+timeStr);
  var url=API_URL+"?mode=add&type="+action+"&message="+msg+"&manualTime="+now.getTime();

  // Optimistic local update
  var cached=getCachedHistory()||[];
  cached.unshift({time:now,type:action,message:decodeURIComponent(msg),rowIndex:null});
  if(cached.length>100)cached=cached.slice(0,100);
  setCachedHistory(cached);
  currentHistory=cached;
  render(cached);
  btnEl.classList.remove("btn-loading");btnEl.textContent=orig;
  notifyRecorded(action);

  if(!isOnline()){
    showToast("📵 Сохранено офлайн");
    enqueue({id:"q"+now.getTime(),url:url,label:msgMap[action],ts:now.getTime()});
    return;
  }

  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok){showToast("✅ Записано!");refreshData();}
      else if(data.skipped){showToast("ℹ️ Уже записано");}
      else{showToast("❌ "+(data.error||"Ошибка"));}
    })
    .catch(function(){
      showToast("📵 Сохранено офлайн");
      enqueue({id:"q"+now.getTime(),url:url,label:msgMap[action],ts:now.getTime()});
      updateOfflineBar();
    });
}

// ── ADD MODAL ──
var addType="sleep";
function openAddModal(){
  var now=new Date();
  document.getElementById("addTime").value=z2(now.getHours())+":"+z2(now.getMinutes());
  document.getElementById("addDay").value="0";
  document.getElementById("addModal").classList.add("show");
}
function closeAddModal(){document.getElementById("addModal").classList.remove("show");}
function selectAddType(el){
  document.querySelectorAll(".modal-type").forEach(function(t){t.classList.remove("active");});
  el.classList.add("active");
  addType=el.dataset.type;
}
function saveAdd(){
  var timeVal=document.getElementById("addTime").value;
  var dayOffset=parseInt(document.getElementById("addDay").value);
  if(!timeVal){showToast("⚠️ Введите время");return;}
  var btn=document.getElementById("addSaveBtn");
  btn.textContent="⏳...";btn.disabled=true;
  var d=new Date();
  d.setDate(d.getDate()-dayOffset);
  var parts=timeVal.split(":");
  d.setHours(parseInt(parts[0]),parseInt(parts[1]),0,0);
  var typeMap={sleep:"sleep",wake:"wake",feed:"feed"};
  var msgMap={sleep:"Уснула",wake:"Проснулась",feed:"Поела"};
  var type=typeMap[addType];
  var msg=encodeURIComponent(msgMap[addType]+" в "+timeVal);
  var url=API_URL+"?mode=add&type="+type+"&message="+msg+"&manualTime="+d.getTime();
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      btn.textContent="Добавить";btn.disabled=false;
      if(data.ok||data.skipped){
        showToast(data.ok?"✅ Запись добавлена!":"ℹ️ Уже есть похожая запись");
        notifyRecorded(type);
        closeAddModal();
        setTimeout(refreshData,500);
      } else {showToast("❌ "+(data.error||"Ошибка"));}
    })
    .catch(function(){
      btn.textContent="Добавить";btn.disabled=false;
      showToast("❌ Нет связи");
    });
}

// ── EDIT MODAL ──
function openEdit(rowIndex,currentTime,desc){
  editRowIndex=rowIndex;
  document.getElementById("editSub").textContent=desc;
  document.getElementById("editInput").value=currentTime;
  document.getElementById("editModal").classList.add("show");
  setTimeout(function(){document.getElementById("editInput").focus();},300);
}
function closeEditModal(){document.getElementById("editModal").classList.remove("show");editRowIndex=null;}
function saveEdit(){
  if(editRowIndex===null)return;
  var newTime=document.getElementById("editInput").value;
  if(!newTime){showToast("⚠️ Введите время");return;}
  var btn=document.getElementById("editSaveBtn");
  btn.textContent="⏳...";btn.disabled=true;
  fetch(API_URL+"?mode=edit&rowIndex="+editRowIndex+"&newTime="+encodeURIComponent(newTime))
    .then(function(r){return r.json();})
    .then(function(data){
      btn.textContent="Сохранить";btn.disabled=false;
      if(data.ok){
        sendNotification("✏️ Запись изменена","");
        showToast("✅ Время обновлено!");
        closeEditModal();
        setTimeout(refreshData,500);
      } else {showToast("❌ "+(data.error||"Ошибка"));}
    })
    .catch(function(){btn.textContent="Сохранить";btn.disabled=false;showToast("❌ Нет связи");});
}
function deleteRecord(){
  if(editRowIndex===null)return;
  if(!confirm("Удалить эту запись?"))return;
  fetch(API_URL+"?mode=delete&rowIndex="+editRowIndex)
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok){showToast("✅ Удалено!");closeEditModal();setTimeout(refreshData,500);}
      else{showToast("❌ "+(data.error||"Ошибка"));}
    })
    .catch(function(){showToast("❌ Нет связи");});
}

// ── WH MODAL ──
function openWhModal(type){
  whType=type;
  document.getElementById("whModalTitle").textContent=type==="weight"?"Вес":"Рост";
  document.getElementById("whModalLabel").textContent=type==="weight"?"Вес (кг)":"Рост (см)";
  document.getElementById("whInput").value="";
  document.getElementById("whInput").placeholder=type==="weight"?"8.2":"68";
  document.getElementById("whInput").step=type==="weight"?"0.1":"1";
  document.getElementById("whModal").classList.add("show");
  setTimeout(function(){document.getElementById("whInput").focus();},300);
}
function closeWhModal(){document.getElementById("whModal").classList.remove("show");whType=null;}
function saveWh(){
  var val=document.getElementById("whInput").value;
  if(!val){showToast("⚠️ Введите значение");return;}
  var btn=document.getElementById("whSaveBtn");
  btn.textContent="⏳...";btn.disabled=true;
  var msg=encodeURIComponent(whType==="weight"?"Вес: "+val+" кг":"Рост: "+val+" см");
  var url=API_URL+"?mode=measurement&subtype="+whType+"&value="+parseFloat(val)+"&message="+msg;
  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      btn.textContent="Сохранить";btn.disabled=false;
      if(data.ok){showToast("✅ Сохранено!");closeWhModal();setTimeout(loadData,500);}
      else{showToast("❌ "+(data.error||"Ошибка"));}
    })
    .catch(function(){btn.textContent="Сохранить";btn.disabled=false;showToast("❌ Нет связи");});
}

// ── BACKUP ──
function doBackup(){
  showToast("⏳ Выгружаем...");
  fetch(API_URL+"?mode=backup")
    .then(function(r){return r.json();})
    .then(function(data){showToast(data.ok?"✅ Выгружено в таблицу!":"❌ "+(data.error||"Ошибка"));})
    .catch(function(){showToast("❌ Нет связи");});
}
function doRestore(){
  if(!confirm("Восстановить данные из таблицы?"))return;
  showToast("⏳ Восстанавливаем...");
  fetch(API_URL+"?mode=restore")
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok){showToast("✅ Восстановлено!");setTimeout(loadData,500);}
      else{showToast("❌ "+(data.error||"Ошибка"));}
    })
    .catch(function(){showToast("❌ Нет связи");});
}

// ── LIVE COUNTER ──
var currentStatusDate=null,currentStatusType=null,currentSleepBase=0;
function updateLiveCounter(){
  if(!currentStatusDate)return;
  var mins=minsAgo(currentStatusDate);
  var el=document.getElementById("liveSince");
  if(el){el.textContent=(currentStatusType==="sleep"?"Спит":"Бодрствует")+" "+formatMin(mins);}
  var sc=document.getElementById("sleepActiveTime");
  if(sc&&currentStatusType==="sleep")sc.textContent=formatMin(mins)+" назад";
  if(currentStatusType==="sleep"){
    var totalNow=safeMin(currentSleepBase+mins);
    var da=251;
    var off=totalNow>0?Math.max(0,da-Math.round(da*(Math.min(totalNow,NORM_MIN)/NORM_MIN))):da;
    var circ=document.querySelector(".circle-fill");
    if(circ)circ.style.strokeDashoffset=off;
    var cv=document.getElementById("circleVal");
    if(cv)cv.textContent=z2(Math.floor(totalNow/60))+":"+z2(totalNow%60);
  }
  var nf=document.getElementById("nextFeedVal"),fl=document.getElementById("feedCountdown");
  if(fl&&nf&&nf.dataset.ts){fl.innerHTML=formatCountdown(minsUntil(new Date(parseInt(nf.dataset.ts))));}
  var ns=document.getElementById("nextSleepVal"),sl=document.getElementById("sleepCountdown");
  if(sl&&ns&&ns.dataset.ts&&currentStatusType!=="sleep"){sl.innerHTML=formatCountdown(minsUntil(new Date(parseInt(ns.dataset.ts))));}
}

// ── CALC DAY SLEEP ──
function calcDaySleep(parsed,logDateStr){
  var total=0,sorted=parsed.slice().reverse();
  for(var i=0;i<sorted.length;i++){
    if(sorted[i].type==="wake"&&sorted[i].logicalDateStr===logDateStr){
      for(var j=i-1;j>=0;j--){
        if(sorted[j].type==="sleep"){
          var ss=sorted[j].date,sm=ss.getHours()*60+ss.getMinutes();
          if(sm>=DAY_SLEEP_START&&sm<DAY_SLEEP_END){
            var dur=Math.floor((sorted[i].date.getTime()-ss.getTime())/60000);
            if(dur>0&&dur<300)total+=dur;
          }
          break;
        }
      }
    }
  }
  return safeMin(total);
}

// ── RENDER HISTORY ITEMS ──
function renderSleepItems(items,max){
  var si=items.filter(function(x){return x.type==="sleep"||x.type==="wake";});
  if(!si.length)return'<div style="color:var(--muted);font-size:12px;padding:4px 0">Нет данных</div>';
  var html="";
  for(var k=0;k<si.length&&k<max;k++){
    var it=si[k],t=z2(it.date.getHours())+":"+z2(it.date.getMinutes());
    var dc=it.type==="wake"?"dot-wake":"dot-sleep",desc=it.type==="wake"?"Проснулась":"Уснула",dur="";
    if(it.type==="wake"&&k+1<si.length&&si[k+1].type==="sleep"){
      var dd=Math.floor((it.date.getTime()-si[k+1].date.getTime())/60000);
      if(dd>0&&dd<300)dur=formatMinLong(dd);
    }
    var ri=it.rowIndex!=null?it.rowIndex:"";
    var oc=ri!==""?'onclick="openEdit('+ri+',\''+t+'\',\''+desc+' в '+t+'\')"':'';
    html+='<div class="hist-item" '+oc+'><div class="hist-dot '+dc+'"></div><div class="hist-time">'+t+'</div><div class="hist-info"><div class="hist-desc">'+desc+'</div>'+(dur?'<div class="hist-dur">'+dur+'</div>':'')+'</div>'+(ri!==""?'<div class="hist-edit">✏️</div>':'')+'</div>';
  }
  return html;
}
function renderFeedItems(items,max){
  var fi=items.filter(function(x){return x.type==="feed";});
  if(!fi.length)return'<div style="color:var(--muted);font-size:12px;padding:4px 0">Нет данных</div>';
  var html="";
  for(var f=0;f<fi.length&&f<max;f++){
    var fitem=fi[f],ft=z2(fitem.date.getHours())+":"+z2(fitem.date.getMinutes());
    var ri=fitem.rowIndex!=null?fitem.rowIndex:"";
    var oc=ri!==""?'onclick="openEdit('+ri+',\''+ft+'\',\'Поела в '+ft+'\')"':'';
    html+='<div class="hist-item" '+oc+'><div class="hist-dot dot-feed"></div><div class="hist-time">'+ft+'</div><div class="hist-info"><div class="hist-desc">Поела</div></div>'+(ri!==""?'<div class="hist-edit">✏️</div>':'')+'</div>';
  }
  return html;
}

function renderForDay(){
  if(!currentHistory.length)return;
  render(currentHistory);
}

// ── MAIN RENDER ──
function render(history){
  currentHistory=history;
  // Кэшируем локально
  setCachedHistory(history.slice(0,100));

  if(!history||!history.length){document.getElementById("content").innerHTML='<div class="error-card">Данных пока нет.</div>';return;}

  var now=new Date();
  var targetDate=new Date(now.getTime()-selectedDayOffset*86400000);
  var targetLogical=getLogicalDateStr(targetDate);
  var prevDate=new Date(targetDate.getTime()-86400000);
  var prevLogical=getLogicalDateStr(prevDate);

  var lastWake=null,lastSleep=null,lastFeed=null,lastWeight=null,lastHeight=null;
  var feedCountDay=0,sleepCountDay=0;
  var parsed=[];

  for(var i=0;i<history.length;i++){
    var item=history[i],d=new Date(item.time),msg=item.message||"";
    var logDate=getLogicalDateStr(d);
    parsed.push({date:d,type:item.type||"",msg:msg,logicalDateStr:logDate,rowIndex:item.rowIndex});
    if(!lastWake&&item.type==="wake")lastWake={date:d};
    if(!lastSleep&&item.type==="sleep")lastSleep={date:d};
    if(!lastFeed&&item.type==="feed")lastFeed={date:d};
    if(!lastWeight&&item.type==="measurement"&&item.subtype==="weight")lastWeight={val:item.value,date:d};
    if(!lastHeight&&item.type==="measurement"&&item.subtype==="height")lastHeight={val:item.value,date:d};
    if(logDate===targetLogical){
      if(item.type==="feed")feedCountDay++;
      if(item.type==="sleep")sleepCountDay++;
    }
  }

  var nextSleep=calcNextSleep(lastWake?lastWake.date:null);
  var nextFeed=calcNextFeed(lastFeed?lastFeed.date:null);

  var isSleeping=false;
  if(lastSleep&&lastWake)isSleeping=lastSleep.date>lastWake.date;
  else if(lastSleep&&!lastWake)isSleeping=true;

  var lastEventDate=isSleeping?(lastSleep?lastSleep.date:null):(lastWake?lastWake.date:null);

  // FIX: вычисляем totalSleepMin ДО установки currentSleepBase
  var totalSleepMin=calcDaySleep(parsed,targetLogical);
  if(selectedDayOffset===0&&isSleeping&&lastSleep){
    var cSMin=lastSleep.date.getHours()*60+lastSleep.date.getMinutes();
    if(cSMin>=DAY_SLEEP_START&&cSMin<DAY_SLEEP_END)totalSleepMin+=safeMin(minsAgo(lastSleep.date));
  }
  totalSleepMin=safeMin(totalSleepMin);

  currentStatusDate=lastEventDate;
  currentStatusType=isSleeping?"sleep":"awake";
  currentSleepBase=totalSleepMin; // FIX: теперь устанавливается после вычисления

  _lastFeedTime=lastFeed?lastFeed.date:null;

  var mins=lastEventDate?minsAgo(lastEventDate):0;
  var sinceStr=lastEventDate?formatMin(mins):"";
  var statusIcon=isSleeping?"🌙":"☀️";
  var statusClass=isSleeping?"sleep":"awake"; // FIX: реально разные значения используются в status-icon
  var statusText=isSleeping?"Спит":"Бодрствует";
  var statusSubTime=isSleeping?(lastSleep?"с "+z2(lastSleep.date.getHours())+":"+z2(lastSleep.date.getMinutes()):""):(lastWake?"проснулась в "+z2(lastWake.date.getHours())+":"+z2(lastWake.date.getMinutes()):"");

  var minsToFeed=nextFeed?minsUntil(nextFeed):null;
  var minsToSleep=(!isSleeping&&nextSleep)?minsUntil(nextSleep):null;

  var dashArr=251;
  var sleepOffset=totalSleepMin>0?Math.max(0,dashArr-Math.round(dashArr*(Math.min(totalSleepMin,NORM_MIN)/NORM_MIN))):dashArr;
  var sleepH=Math.floor(totalSleepMin/60),sleepM=totalSleepMin%60;
  var sleepTimeStr=z2(sleepH)+":"+z2(sleepM);

  // Night sleep
  var nightSleepStr="—";
  var sortedNight=parsed.slice().reverse();
  for(var ni=0;ni<sortedNight.length;ni++){
    if(sortedNight[ni].type==="wake"&&getLogicalDateStr(sortedNight[ni].date)===targetLogical){
      for(var nj=ni-1;nj>=0;nj--){
        if(sortedNight[nj].type==="sleep"){
          var nss=sortedNight[nj].date,nsm=nss.getHours()*60+nss.getMinutes();
          if(nsm<DAY_SLEEP_START||nsm>=DAY_SLEEP_END){
            var nd2=Math.floor((sortedNight[ni].date.getTime()-nss.getTime())/60000);
            if(nd2>120)nightSleepStr=z2(Math.floor(nd2/60))+":"+z2(nd2%60);
          }
          break;
        }
      }
      break;
    }
  }

  // Chart — 7 дней
  var chartBars="",DAY_NAMES=["вс","пн","вт","ср","чт","пт","сб"];
  var now7=new Date(),chartMins=[],chartLabels=[];
  for(var cd=6;cd>=0;cd--){
    var dayD=new Date(now7.getTime()-cd*86400000);
    var dayMin=calcDaySleep(parsed,getLogicalDateStr(dayD));
    if(cd===0&&selectedDayOffset===0&&isSleeping&&lastSleep){
      var cs2=lastSleep.date.getHours()*60+lastSleep.date.getMinutes();
      if(cs2>=DAY_SLEEP_START&&cs2<DAY_SLEEP_END)dayMin+=minsAgo(lastSleep.date);
    }
    chartMins.push(safeMin(dayMin));
    chartLabels.push(DAY_NAMES[dayD.getDay()]);
  }
  var MAX_CHART_MIN=210;
  for(var ci=0;ci<7;ci++){
    var isToday=(ci===6&&selectedDayOffset===0);
    var fillH=chartMins[ci]>0?Math.min(100,Math.round(chartMins[ci]/MAX_CHART_MIN*100)):0;
    var ch=Math.floor(chartMins[ci]/60),cm=chartMins[ci]%60;
    var timeLabel=chartMins[ci]>0?(ch+":"+(cm<10?"0"+cm:cm)):"";
    var fill='<div class="chart-bar-fill" style="height:'+fillH+'%">'+(timeLabel&&fillH>=22?'<div class="chart-bar-label">'+timeLabel+'</div>':'')+'</div>';
    chartBars+='<div class="chart-day'+(isToday?" today":"")+'"><div class="chart-bar-wrap"><div class="chart-norm-line"></div>'+fill+'</div><div class="chart-day-lbl">'+chartLabels[ci]+'</div></div>';
  }

  // Day items
  var dayItems=[],prevItems=[];
  for(var ji=0;ji<parsed.length;ji++){
    if(parsed[ji].logicalDateStr===targetLogical)dayItems.push(parsed[ji]);
    else if(parsed[ji].logicalDateStr===prevLogical)prevItems.push(parsed[ji]);
  }

  // Notifications
  clearNotifyTimers();
  if(nextSleep&&!isSleeping)scheduleNotify("sleep",nextSleep);
  if(nextFeed)scheduleNotify("feed",nextFeed);

  // Age
  var age=calcAge(),ageStr="";
  if(age.years>0)ageStr+=age.years+" "+pluralRus(age.years,"год","года","лет")+" ";
  ageStr+=age.months+" "+pluralRus(age.months,"месяц","месяца","месяцев")+" "+age.days+" "+pluralRus(age.days,"день","дня","дней");

  // Birthday
  var today2=new Date();
  var nextBD=new Date(today2.getFullYear(),BIRTHDAY.getMonth(),BIRTHDAY.getDate());
  if(nextBD<=today2)nextBD.setFullYear(today2.getFullYear()+1);
  var daysUntilBD=Math.ceil((nextBD.getTime()-today2.getTime())/86400000);
  var whStr=(lastWeight?lastWeight.val+"кг":"-")+" · "+(lastHeight?lastHeight.val+"см":"-");

  // Sleep card
  var sleepCardLabel=isSleeping?"Уснула в":"Спать в";
  var sleepCardTime=isSleeping?(lastSleep?z2(lastSleep.date.getHours())+":"+z2(lastSleep.date.getMinutes()):"—"):dateToHHMM(nextSleep);
  var sleepCardSub=isSleeping?(lastSleep?formatMin(minsAgo(lastSleep.date))+" назад":""):formatCountdown(minsToSleep);
  var feedCardSub=formatCountdown(minsToFeed);

  var actionBtns=isSleeping
    ?'<button class="act-card btn-wake" onclick="sendAction(\'wake\',this,\'Проснулась\')">☀️ Проснулась</button><button class="act-card btn-feed" onclick="sendAction(\'feed\',this,\'Поела\')">🍼 Поела</button>'
    :'<button class="act-card btn-sleep" onclick="sendAction(\'sleep\',this,\'Уснула\')">🌙 Уснула</button><button class="act-card btn-feed" onclick="sendAction(\'feed\',this,\'Поела\')">🍼 Поела</button>';

  var dayLabelText=selectedDayOffset===0?"🕐 Сегодня":selectedDayOffset===1?"🕐 Вчера":("🕐 "+targetDate.getDate()+" "+MONTHS_SHORT[targetDate.getMonth()]);
  var prevLabelText=selectedDayOffset===0?"📅 Вчера":selectedDayOffset===1?"📅 Позавчера":("📅 "+prevDate.getDate()+" "+MONTHS_SHORT[prevDate.getMonth()]);

  var html=''
    +'<div class="age-bar fu fu1"><div class="age-emoji">👶</div><div class="age-main"><div class="age-text">'+ageStr+'</div><div class="age-sub">родилась 23 июля 2025 · до ДР '+daysUntilBD+' '+pluralRus(daysUntilBD,"день","дня","дней")+'</div></div><div class="age-right"><div class="age-wh">'+whStr+'</div></div></div>'
    +'<div class="status-big fu fu2"><div class="status-row"><div class="status-icon '+statusClass+'">'+statusIcon+'</div><div><div class="status-timer" id="liveSince" style="color:'+(isSleeping?'var(--accent2)':'var(--accent4)')+'">'+statusText+' '+sinceStr+'</div>'+(isSleeping?'':('<div class="status-since">'+statusSubTime+'</div>'))+'</div></div></div>'
    +'<div class="two-col fu fu2">'+actionBtns+'</div>'
    +'<div class="two-col fu fu3">'
    +'<div class="mini-card sleep-c"><div class="mini-icon">'+(isSleeping?"🌙":"🛏")+'</div><div class="mini-label">'+sleepCardLabel+'</div><div class="mini-time" id="'+(isSleeping?"":"nextSleepVal")+'" '+(isSleeping?"":"data-ts='"+(nextSleep?nextSleep.getTime():""  )+"'")+'>'+sleepCardTime+'</div><div class="mini-sub" id="'+(isSleeping?"sleepActiveTime":"sleepCountdown")+'">'+sleepCardSub+'</div></div>'
    +'<div class="mini-card feed-c"><div class="mini-icon">🍼</div><div class="mini-label">Кормить в</div><div class="mini-time" id="nextFeedVal" data-ts="'+(nextFeed?nextFeed.getTime():"")+'">'+dateToHHMM(nextFeed)+'</div><div class="mini-sub" id="feedCountdown">'+feedCardSub+'</div></div>'
    +'</div>'
    +'<div class="circle-pills-row fu fu4">'
    +'<div class="circle-card"><div class="circle-wrap"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="sleepGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#5ab4ff"/><stop offset="100%" stop-color="#2edba8"/></linearGradient></defs><circle class="circle-bg" cx="50" cy="50" r="40"/><circle class="circle-fill" cx="50" cy="50" r="40" style="stroke-dashoffset:'+sleepOffset+'"/></svg><div class="circle-inner"><div class="circle-val" id="circleVal">'+sleepTimeStr+'</div><div class="circle-lbl">дн. сон</div></div></div></div>'
    +'<div class="pills-col">'
    +'<div class="pill"><div class="pill-val" style="color:var(--accent1)">'+feedCountDay+'</div><div class="pill-label">Кормлений</div></div>'
    +'<div class="pill"><div class="pill-val" style="color:var(--accent4)">'+sleepCountDay+'</div><div class="pill-label">Снов</div></div>'
    +'<div class="pill"><div class="pill-val" style="color:var(--accent2)">'+nightSleepStr+'</div><div class="pill-label">Ночной сон</div></div>'
    +'</div></div>'
    +'<div class="wh-row fu fu4">'
    +'<div class="wh-card weight" onclick="openWhModal(\'weight\')"><div class="wh-edit-icon">✏️</div><div class="wh-icon">⚖️</div><div class="wh-label">Вес</div><div class="wh-val">'+(lastWeight?lastWeight.val+" кг":"—")+'</div><div class="wh-date">'+(lastWeight?lastWeight.date.getDate()+" "+MONTHS_SHORT[lastWeight.date.getMonth()]:"нет данных")+'</div></div>'
    +'<div class="wh-card height" onclick="openWhModal(\'height\')"><div class="wh-edit-icon">✏️</div><div class="wh-icon">📏</div><div class="wh-label">Рост</div><div class="wh-val">'+(lastHeight?lastHeight.val+" см":"—")+'</div><div class="wh-date">'+(lastHeight?lastHeight.date.getDate()+" "+MONTHS_SHORT[lastHeight.date.getMonth()]:"нет данных")+'</div></div>'
    +'</div>'
    +'<div class="chart-card fu fu5"><div class="chart-title">📊 Дневной сон за 7 дней</div><div class="chart-bars">'+chartBars+'</div></div>'
    +'<div class="hist-header fu fu6"><div class="day-label">'+dayLabelText+'</div><div class="add-btn" onclick="openAddModal()">+</div></div>'
    +'<div class="two-col-hist fu fu6"><div class="hist-card"><div class="hist-title">🛏 Сон</div>'+renderSleepItems(dayItems,12)+'</div><div class="hist-card"><div class="hist-title">🍼 Кормление</div>'+renderFeedItems(dayItems,12)+'</div></div>'
    +(prevItems.length?'<div class="hist-header"><div class="day-label">'+prevLabelText+'</div></div><div class="two-col-hist"><div class="hist-card"><div class="hist-title">🛏 Сон</div>'+renderSleepItems(prevItems,8)+'</div><div class="hist-card"><div class="hist-title">🍼 Кормление</div>'+renderFeedItems(prevItems,8)+'</div></div>':'')
    +'<div class="backup-row fu fu6"><button class="backup-btn export" onclick="doBackup()">💾 Выгрузка в таблицу</button><button class="backup-btn restore" onclick="doRestore()">📥 Восстановить</button></div>';

  document.getElementById("content").innerHTML=html;
}

// ── LOAD ──
function loadData(){
  // Сначала показываем локальный кэш — мгновенно
  var cached=getCachedHistory();
  if(cached&&cached.length){render(cached);}

  var btn=document.getElementById("refreshBtn");
  if(btn)btn.classList.add("spinning");
  fetch(API_URL)
    .then(function(r){return r.json();})
    .then(function(data){render(data.history||[]);if(btn)btn.classList.remove("spinning");})
    .catch(function(){if(btn)btn.classList.remove("spinning");});
}

function refreshData(){
  var btn=document.getElementById("refreshBtn");
  if(btn)btn.classList.add("spinning");
  fetch(API_URL+"?mode=refresh")
    .then(function(r){return r.json();})
    .then(function(data){render(data.history||[]);if(btn)btn.classList.remove("spinning");})
    .catch(function(){if(btn)btn.classList.remove("spinning");});
}

document.getElementById("refreshBtn").onclick=refreshData;

// ── NOTES ──
function getNotes(){try{var r=localStorage.getItem(LS_NOTES);return r?JSON.parse(r):[];}catch(e){return[];}}
function saveNotes(notes){try{localStorage.setItem(LS_NOTES,JSON.stringify(notes));}catch(e){}}
function escNote(s){return(s||"").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function openNotes(){
  document.getElementById("dashboardPage").classList.add("slide-down");
  document.getElementById("nbPage").classList.add("slide-up");
  document.getElementById("notebookBtn").classList.add("active");
  renderNotes();
  // Подгружаем заметки с сервера — восстанавливает после потери localStorage
  if(isOnline()){
    fetch(API_URL+"?mode=notes")
      .then(function(r){return r.json();})
      .then(function(data){
        if(data.ok&&data.notes&&data.notes.length){
          var local=getNotes();
          var ids=local.map(function(n){return n.id;});
          var merged=local.slice();
          data.notes.forEach(function(n){
            if(n.id&&ids.indexOf(n.id)===-1)merged.push(n);
          });
          if(merged.length>local.length){saveNotes(merged);renderNotes();}
        }
      }).catch(function(){});
  }
}
function closeNotes(){
  document.getElementById("dashboardPage").classList.remove("slide-down");
  document.getElementById("nbPage").classList.remove("slide-up");
  document.getElementById("notebookBtn").classList.remove("active");
}
function renderNotes(){
  var notes=getNotes().sort(function(a,b){return b.ts-a.ts;});
  var list=document.getElementById("nbList");
  var badge=document.getElementById("nbBadge");
  if(badge)badge.textContent=notes.length+(notes.length===1?" заметка":notes.length<5?" заметки":" заметок");
  if(!notes.length){list.innerHTML='<div class="nb-empty">📝<br><br>Заметок пока нет.<br>Нажмите + чтобы добавить.</div>';return;}
  list.innerHTML="";
  notes.forEach(function(note,idx){
    var card=document.createElement("div");
    card.className="nb-card";
    card.style.animationDelay=(idx*0.04)+"s";
    card.style.animation="fadeUp 0.3s ease both";
    var d=new Date(note.ts);
    var dm=note.modified?new Date(note.modified):d;
    var dateStr=d.getDate()+" "+MONTHS_SHORT[d.getMonth()];
    var timeStr=z2(d.getHours())+":"+z2(d.getMinutes());
    var modStr=dm.getTime()!==d.getTime()?"изм. "+z2(dm.getHours())+":"+z2(dm.getMinutes()):"";
    card.innerHTML=
      '<div class="nb-meta">'
        +'<button class="nb-date-btn" onclick="pickNoteDate(\''+note.id+'\')">'+dateStr+'</button>'
        +'<button class="nb-time-btn" onclick="pickNoteTime(\''+note.id+'\')">'+timeStr+'</button>'
        +(note.offline?'<span class="nb-offline">офлайн</span>':'')
        +(modStr?'<span class="nb-modified">'+modStr+'</span>':'')
      +'</div>'
      +'<textarea class="nb-textarea" placeholder="Текст заметки…" onblur="updateNoteText(\''+note.id+'\',this.value)">'+escNote(note.text||'')+'</textarea>'
      +'<div class="nb-footer"><div class="nb-del-btn" onclick="deleteNote(\''+note.id+'\')">🗑</div></div>';
    list.appendChild(card);
  });
}
function addNote(){
  var now=new Date();
  var note={id:"n"+now.getTime(),ts:now.getTime(),modified:now.getTime(),text:"",offline:!isOnline()};
  var notes=getNotes();notes.push(note);saveNotes(notes);renderNotes();
  setTimeout(function(){var tas=document.querySelectorAll(".nb-textarea");if(tas.length)tas[0].focus();},100);
  if(isOnline())syncNoteAdd(note);
  else enqueue({id:"nq"+now.getTime(),url:API_URL+"?mode=noteAdd&id="+encodeURIComponent(note.id)+"&ts="+note.ts+"&text=",label:"Заметка",ts:now.getTime()});
}
function updateNoteText(id,val){
  var notes=getNotes();
  var note=notes.find(function(n){return n.id===id;});
  if(!note||note.text===val)return;
  note.text=val;note.modified=Date.now();saveNotes(notes);renderNotes();
  if(isOnline())syncNoteEdit(note);
}
function deleteNote(id){
  if(!confirm("Удалить заметку?"))return;
  var notes=getNotes().filter(function(n){return n.id!==id;});
  saveNotes(notes);renderNotes();showToast("🗑 Заметка удалена");
  if(isOnline())syncNoteDelete(id);
}
function pickNoteDate(id){
  var notes=getNotes();var note=notes.find(function(n){return n.id===id;});if(!note)return;
  var d=new Date(note.ts);
  var newDate=prompt("Введите дату (ГГГГ-ММ-ДД):",d.getFullYear()+"-"+z2(d.getMonth()+1)+"-"+z2(d.getDate()));
  if(!newDate||!/^\d{4}-\d{2}-\d{2}$/.test(newDate))return;
  var p=newDate.split("-");d.setFullYear(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  note.ts=d.getTime();note.modified=Date.now();saveNotes(notes);renderNotes();
  if(isOnline())syncNoteEdit(note);
}
function pickNoteTime(id){
  var notes=getNotes();var note=notes.find(function(n){return n.id===id;});if(!note)return;
  var d=new Date(note.ts);
  var newTime=prompt("Введите время (ЧЧ:ММ):",z2(d.getHours())+":"+z2(d.getMinutes()));
  if(!newTime||!/^\d{2}:\d{2}$/.test(newTime))return;
  var p=newTime.split(":");d.setHours(parseInt(p[0]),parseInt(p[1]),0,0);
  note.ts=d.getTime();note.modified=Date.now();saveNotes(notes);renderNotes();
  if(isOnline())syncNoteEdit(note);
}
function syncNoteAdd(note){
  fetch(API_URL+"?mode=noteAdd&id="+encodeURIComponent(note.id)+"&ts="+note.ts+"&text="+encodeURIComponent(note.text||""))
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok){var notes=getNotes();var n=notes.find(function(x){return x.id===note.id;});if(n){n.offline=false;saveNotes(notes);renderNotes();}}
    }).catch(function(){});
}
function syncNoteEdit(note){
  fetch(API_URL+"?mode=noteEdit&id="+encodeURIComponent(note.id)+"&ts="+note.ts+"&text="+encodeURIComponent(note.text||"")+"&modified="+note.modified).catch(function(){});
}
function syncNoteDelete(id){
  fetch(API_URL+"?mode=noteDelete&id="+encodeURIComponent(id)).catch(function(){});
}

// ── INIT ──
registerSW();
updateBell();
buildDateOptions();
updateHeaderDate();
updateHeader();

// Миграция заметок из старого ключа (демо-версия использовала 'stesha_notes' напрямую)
// Если заметки хранились под другим ключом — переносим
(function migrateNotes(){
  var oldKeys = ['notes', 'NOTES_KEY', 'nb_notes'];
  oldKeys.forEach(function(key) {
    try {
      var raw = localStorage.getItem(key);
      if (!raw) return;
      var old = JSON.parse(raw);
      if (!Array.isArray(old) || !old.length) return;
      var current = getNotes();
      var ids = current.map(function(n){ return n.id; });
      var merged = current.slice();
      old.forEach(function(n) {
        if (n.id && ids.indexOf(n.id) === -1) merged.push(n);
      });
      if (merged.length > current.length) {
        saveNotes(merged);
        localStorage.removeItem(key);
      }
    } catch(e) {}
  });
})();

// Восстанавливаем очередь при загрузке и сразу пытаемся синхронизировать
updateOfflineBar();
if(isOnline()&&getQueue().length)flushQueue();

// Обновляем live counter каждые 30 сек (было 60 — слишком редко)
setInterval(updateLiveCounter,30000);
setInterval(updateHeader,60000);

loadData();

document.addEventListener("visibilitychange",function(){
  if(document.visibilityState==="visible"){updateHeader();loadData();}
});
</script>
